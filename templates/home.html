<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forest Fire Prediction</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
            margin:0;
            padding:20px;
        }
        .container{
            max-width:800px;
            margin:auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }
        h2{
            text-align:center;
        }
        .form-group{
            margin-bottom:15px;
        }
        label{
            display:block;
            margin-bottom:5px;
            font-weight:bold;
        }
        input{
            width:100%;
            padding:8px;
            border:1px solid #ccc;
            border-radius:5px;
        }
        button{
            width:100%;
            padding:10px;
            background:#28a745;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }
        button:hover{
            background:#218838;
        }
        .result{
            margin-top:20px;
            text-align:center;
            font-size:20px;
            font-weight:bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Forest Fire Weather Prediction</h2>

```
<form action="{{url_for('pred')}}" method="POST">

    <div class="form-group">
        <label>Day</label>
        <input type="number" name="day" required>
    </div>

    <div class="form-group">
        <label>Month</label>
        <input type="number" name="month" required>
    </div>

    <div class="form-group">
        <label>Year</label>
        <input type="number" name="year" required>
    </div>

    <div class="form-group">
        <label>Temperature</label>
        <input type="number" step="any" name="Temperature" required>
    </div>

    <div class="form-group">
        <label>RH</label>
        <input type="number" step="any" name="RH" required>
    </div>

    <div class="form-group">
        <label>Ws</label>
        <input type="number" step="any" name="Ws" required>
    </div>

    <div class="form-group">
        <label>Rain</label>
        <input type="number" step="any" name="Rain" required>
    </div>

    <div class="form-group">
        <label>FFMC</label>
        <input type="number" step="any" name="FFMC" required>
    </div>

    <div class="form-group">
        <label>DMC</label>
        <input type="number" step="any" name="DMC" required>
    </div>

    <div class="form-group">
        <label>DC</label>
        <input type="number" step="any" name="DC" required>
    </div>

    <div class="form-group">
        <label>ISI</label>
        <input type="number" step="any" name="ISI" required>
    </div>

    <div class="form-group">
        <label>BUI</label>
        <input type="number" step="any" name="BUI" required>
    </div>

    <div class="form-group">
        <label>Classes</label>
        <input type="number" step="any" name="Classes" required>
    </div>

    <div class="form-group">
        <label>Region</label>
        <input type="number" step="any" name="Region" required>
    </div>

    <button type="submit">Predict</button>

</form>

{% if res %}
<div class="result">
    Prediction: {{ res }}
</div>
{% endif %}
```

</div>

</body>
</html>
